  <!-- 分隔线 -->
  <line x1="320" y1="125" x2="1160" y2="125" stroke="#3e3e42" stroke-width="1"/>

  <!-- Markdown 渲染效果 -->
  <!-- H1 -->
  <text x="340" y="175" fill="#d4d4d4" font-size="24" font-weight="700">📅 下周内容规划方案</text>
  <line x1="340" y1="185" x2="480" y2="185" stroke="#4ec9b0" stroke-width="2"/>

  <!-- H2 -->
  <rect x="340" y="205" width="4" height="24" rx="2" fill="#4ec9b0"/>
  <text x="355" y="223" fill="#d4d4d4" font-size="18" font-weight="600">一、本周数据回顾</text>

  <text x="340" y="258" fill="#d4d4d4" font-size="14" line-height="1.6">上周共发布 7 篇笔记，总曝光量 12.5w，环比增长</text>
  <text x="340" y="278" fill="#4ec9b0" font-size="14">+23%</text>
  <text x="380" y="278" fill="#d4d4d4" font-size="14">。互动率最高的内容为「AI 工具推荐」系列。</text>

  <!-- 表格 -->
  <rect x="340" y="300" width="500" height="90" rx="6" fill="#2d2d30"/>
  <text x="360" y="322" fill="#d4d4d4" font-size="12" font-weight="600">分类</text>
  <line x1="440" y1="300" x2="440" y2="390" stroke="#3e3e42" stroke-width="1"/>
  <text x="460" y="322" fill="#d4d4d4" font-size="12" font-weight="600">发布数</text>
  <line x1="540" y1="300" x2="540" y2="390" stroke="#3e3e42" stroke-width="1"/>
  <text x="560" y="322" fill="#d4d4d4" font-size="12" font-weight="600">曝光量</text>
  <line x1="640" y1="300" x2="640" y2="390" stroke="#3e3e42" stroke-width="1"/>
  <text x="660" y="322" fill="#d4d4d4" font-size="12" font-weight="600">互动率</text>
  <line x1="340" y1="330" x2="840" y2="330" stroke="#3e3e42" stroke-width="1"/>

  <text x="360" y="352" fill="#d4d4d4" font-size="12">AI 工具</text>
  <text x="460" y="352" fill="#d4d4d4" font-size="12">3</text>
  <text x="560" y="352" fill="#d4d4d4" font-size="12">5.2w</text>
  <text x="665" y="352" fill="#4ec9b0" font-size="12">8.7%</text>
  <line x1="340" y1="360" x2="840" y2="360" stroke="#3e3e42" stroke-width="0.5"/>

  <text x="360" y="380" fill="#d4d4d4" font-size="12">行业观察</text>
  <text x="460" y="380" fill="#d4d4d4" font-size="12">4</text>
  <text x="560" y="380" fill="#d4d4d4" font-size="12">7.3w</text>
  <text x="665" y="380" fill="#4ec9b0" font-size="12">5.2%</text>

  <!-- H2 -->
  <rect x="340" y="420" width="4" height="24" rx="2" fill="#4ec9b0"/>
  <text x="355" y="438" fill="#d4d4d4" font-size="18" font-weight="600">二、下周选题规划</text>

  <!-- 列表项 -->
  <text x="360" y="472" fill="#d4d4d4" font-size="14">•</text>
  <text x="380" y="472" fill="#d4d4d4" font-size="14" font-weight="500">选题 1：2024 下半年 AI 工具趋势预测</text>
  <text x="380" y="492" fill="#858585" font-size="12">定位：行业趋势 · 目标阅读时长 3min · 互动目标 500+</text>

  <text x="360" y="520" fill="#d4d4d4" font-size="14">•</text>
  <text x="380" y="520" fill="#d4d4d4" font-size="14" font-weight="500">选题 2：零基础搭建个人知识库</text>
  <text x="380" y="540" fill="#858585" font-size="12">定位：教程类 · 目标阅读时长 5min · 互动目标 300+</text>

  <!-- Blockquote -->
  <rect x="340" y="565" width="4" height="36" rx="2" fill="#4ec9b0"/>
  <rect x="344" y="565" width="480" height="36" rx="0" fill="#2d2d30" rx="0 6 6 0"/>
  <text x="360" y="582" fill="#858585" font-size="12" font-style="italic">💡 建议：优先发布选题 1，利用「AI 预测」话题热度获取</text>
  <text x="360" y="598" fill="#858585" font-size="12" font-style="italic">更大曝光</text>

  <!-- 右下角字体控制 -->
  <rect x="1080" y="690" width="90" height="36" rx="8" fill="#2d2d30" stroke="#3e3e42" stroke-width="1"/>
  <text x="1090" y="713" fill="#d4d4d4" font-size="14">A−</text>
  <text x="1125" y="713" fill="#858585" font-size="12">16px</text>
  <text x="1155" y="713" fill="#d4d4d4" font-size="14">A+</text>
</svg>
