  <text x="344" y="110" text-anchor="middle" fill="#4ec9b0" font-size="22">📄</text>

  <text x="380" y="96" fill="#d4d4d4" font-size="16" font-weight="600">2024-06-19-内容规划.md</text>
  <text x="380" y="116" fill="#858585" font-size="12">📝 3,846 字 · 2024-06-19 10:30</text>

  <!-- 收藏按钮 -->
  <rect x="1050" y="85" width="85" height="28" rx="6" fill="#2d2d30" stroke="#3e3e42" stroke-width="1"/>
